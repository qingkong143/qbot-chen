name: Clang-Tidy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  tidy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            clang-tidy \
            cmake \
            ninja-build \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            nlohmann-json3-dev \
            libsqlite3-dev

      - name: Run clang-tidy
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_CLANG_TIDY="clang-tidy;-checks='*,-fuchsia-*,-google-*,-android-*,-objc-*,-altera-*,-cppcoreguidelines-pro-bounds-array-to-pointer-decay'"
          cmake --build build 2>&1 | tee tidy_report.txt
        continue-on-error: true

      - name: Upload tidy report
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: tidy_report.txt
          retention-days: 14
