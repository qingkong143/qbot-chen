name: Build (Ubuntu)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update -y
        sudo apt install -y --no-install-recommends \
          build-essential \
          cmake \
          libcurl4-openssl-dev \
          libssl-dev \
          nlohmann-json3-dev \
          libsqlite3-dev \
          git

    - name: Build
      run: sh build.sh
